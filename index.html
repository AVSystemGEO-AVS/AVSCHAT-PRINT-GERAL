<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMPRIMIR</title>
</head>

<body>

  <script src="https://fileschat.sfo2.cdn.digitaloceanspaces.com/public/libs/wlclient.js"></script>

  <script>
    const N8N_WEBHOOK_URL = "https://n8n.srv1157562.hstgr.cloud/webhook/imprimir_historico";

    const numero = "@contato.numero";
    const chatId = "@chat.codigo";
    const tokenAVS = "@canal.token";

    function getParam(name) {
      try { return new URL(window.location.href).searchParams.get(name); }
      catch (_) { return null; }
    }

    async function chamarN8n(payload, url) {
      console.log("[IMPRIMIR] POST N8N:", url);
      console.log("[IMPRIMIR] PAYLOAD:", payload);

      let resp;
      try {
        resp = await fetch(url, {
          method: "POST",
          cache: "no-store",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(payload),
        });
      } catch (e) {
        throw new Error("Falha ao chamar n8n: " + (e?.message || e));
      }

      const raw = await resp.text().catch(() => "");
      console.log("[IMPRIMIR] N8N status:", resp.status, "raw:", raw);

      if (!raw) throw new Error("N8N retornou vazio.");

      let data;
      try {
        data = JSON.parse(raw);
      } catch (_) {
        throw new Error("N8N não retornou JSON válido. Resposta: " + raw);
      }

      let respostaText = "";

      if (Array.isArray(data)) {
        if (data[0] && typeof data[0].resposta === "string") {
          respostaText = data[0].resposta;
        } else {
          throw new Error("Array retornado sem 'resposta' válida.");
        }
      }

      else if (typeof data.resposta === "string") {
        respostaText = data.resposta;
      }

      else {
        throw new Error("JSON inválido. Esperado {resposta: string}");
      }

      return respostaText;
    }

    function imprimirTexto(resposta, titulo) {
      const safeTitle = titulo || "Histórico";
      const safeText = String(resposta || "")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      const html = `
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
    <meta charset="UTF-8" />
    <title>${safeTitle}</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; padding: 24px; }
        h1 { font-size: 18px; margin: 0 0 12px; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 12.5px; line-height: 1.45; }
    </style>
    </head>
    <body>
    <h1>${safeTitle}</h1>
    <pre>${safeText}</pre>
    </body>
    </html>`.trim();

      const iframe = document.createElement("iframe");
      iframe.style.position = "fixed";
      iframe.style.right = "0";
      iframe.style.bottom = "0";
      iframe.style.width = "0";
      iframe.style.height = "0";
      iframe.style.border = "0";
      document.body.appendChild(iframe);

      let jaImprimiu = false;

      iframe.onload = function () {
        if (jaImprimiu) return;
        jaImprimiu = true;

        setTimeout(() => {
          try {
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
          } finally {
            setTimeout(() => iframe.remove(), 1000);
          }
        }, 200);
      };

      const doc = iframe.contentWindow.document;
      doc.open();
      doc.write(html);
      doc.close();
    }
    
    function renderModal() {
      document.body.innerHTML = "";
    
      document.body.style.fontFamily = "Arial, Helvetica, sans-serif";
      document.body.style.fontSize = "14px";
      document.body.style.margin = "0";
      document.body.style.padding = "15px";
    
      // TÍTULO
      const titulo = document.createElement("div");
      titulo.innerText = "Informe a data inicial e final (DD/MM/AA)";
      titulo.style.marginBottom = "10px";
      document.body.appendChild(titulo);
    
      // INPUT INICIO
      const inputInicio = document.createElement("input");
      inputInicio.placeholder = "Data início (DD/MM/AA)";
      inputInicio.style.display = "block";
      inputInicio.style.width = "100%";
      inputInicio.style.marginBottom = "8px";
      inputInicio.style.padding = "6px";
      inputInicio.maxLength = 8;
    
      // INPUT FIM
      const inputFim = document.createElement("input");
      inputFim.placeholder = "Data fim (DD/MM/AA)";
      inputFim.style.display = "block";
      inputFim.style.width = "100%";
      inputFim.style.marginBottom = "12px";
      inputFim.style.padding = "6px";
      inputFim.maxLength = 8;
    
      document.body.appendChild(inputInicio);
      document.body.appendChild(inputFim);
    
      // BOTÃO CONFIRMAR
      const btnConfirmar = document.createElement("button");
      btnConfirmar.innerText = "CONFIRMAR";
      btnConfirmar.style.width = "100%";
      btnConfirmar.style.padding = "8px";
      btnConfirmar.style.background = "#192d3e";
      btnConfirmar.style.color = "#fff";
      btnConfirmar.style.border = "none";
      btnConfirmar.style.marginBottom = "6px";
    
      // BOTÃO CANCELAR
      const btnCancelar = document.createElement("button");
      btnCancelar.innerText = "CANCELAR";
      btnCancelar.style.width = "100%";
      btnCancelar.style.padding = "8px";
    
      document.body.appendChild(btnConfirmar);
      document.body.appendChild(btnCancelar);
    
      // EVENTOS
      btnCancelar.onclick = () => {
        window.WlExtension.closeModal({ cancelled: true });
      };
    
      btnConfirmar.onclick = () => {
        const regex = /^\d{2}\/\d{2}\/\d{2}$/;
    
        if (!regex.test(inputInicio.value) || !regex.test(inputFim.value)) {
          alert("Datas inválidas. Use DD/MM/AA.");
          return;
        }
    
        window.WlExtension.closeModal({
          action: "periodo",
          dataInicio: inputInicio.value,
          dataFim: inputFim.value
        });
      };
    }

    function initExtension() {
      window.WlExtension.initialize({
        buttons: {
          "attendance-view": [
            {
              icon_url: "https://img.icons8.com/material-sharp/15/000000/print.png",
              text: "IMPRIMIR",
              callback: (atendimento) => {

                const modalUrl =
                  "https://avsysgeo-mariaeduarda.github.io/IMPRIMIR_AVS_CHAT/?mode=modal&v=" +
                  Date.now();

                window.WlExtension.modal({
                  title: "IMPRIMIR",
                  url: modalUrl,
                  maxWidth: "650px",
                  height: "300px",

                  callback: async (ret) => {
                    console.log("RETORNO MODAL:", ret);

                    if (!ret || ret.cancelled) return;

                    let userInfo = {};
                    try {
                      userInfo = await window.WlExtension.getInfoUser();
                    } catch (e) { }

                    const payload = {
                      tipo: ret.action,
                      data: ret.data || "",

                      attendanceId: atendimento?.atendimentoId ?? "",
                      contactId: atendimento?.contactId ?? atendimento?.contact?.id ?? "",
                      channelId: atendimento?.channelId ?? atendimento?.channel?.id ?? "",
                      organizationId: atendimento?.organizationId ?? atendimento?.organization?.id ?? "",
                      sectorId: atendimento?.sectorId ?? atendimento?.sector?.id ?? "",

                      userId: userInfo?.userId || "",
                      systemKey: userInfo?.systemKey || "",

                      numero: numero,
                      chatId: chatId,
                      tokenAVS: tokenAVS
                    };

                    try {

                      const webhookUrl = N8N_WEBHOOK_URL;

                      console.log("WEBHOOK ESCOLHIDO:", webhookUrl);

                      const resposta = await chamarN8n(payload, webhookUrl);

                      const titulo =
                        ret.action === "data"
                          ? "Histórico de " + ret.data
                          : "Histórico de hoje";

                      imprimirTexto(resposta, titulo);

                      window.WlExtension.alert({
                        message: "Impressão enviada!",
                        variant: "success"
                      });

                    } catch (e) {
                      window.WlExtension.alert({
                        message: "Falhou ao imprimir: " + String(e?.message || e),
                        variant: "error"
                      });
                    }
                  }

                });
              }
            }
          ]
        }
      });
    }

    if (getParam("mode") === "modal") {
      renderModal();
    } else {
      initExtension();
    }
  </script>

</body>

</html>
