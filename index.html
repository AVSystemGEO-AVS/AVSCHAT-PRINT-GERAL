<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IMPRIMIR</title>
</head>
<body>

<script src="https://fileschat.sfo2.cdn.digitaloceanspaces.com/public/libs/wlclient.js"></script>

<script>
  const N8N_WEBHOOK_URL = "https://n8n.srv1157562.hstgr.cloud/webhook/imprimir_historico";

  const numero = "@contato.numero";
  const chatId = "@chat.codigo";
  const tokenAVS = "@canal.token";

  function getParam(name) {
    try { return new URL(window.location.href).searchParams.get(name); }
    catch (_) { return null; }
  }

  async function chamarN8n(payload) {
    console.log("[IMPRIMIR] POST N8N:", N8N_WEBHOOK_URL);
    console.log("[IMPRIMIR] PAYLOAD:", payload);

    let resp;
    try {
      resp = await fetch(N8N_WEBHOOK_URL, {
        method: "POST",
        cache: "no-store",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(payload),
      });
    } catch (e) {
      throw new Error("Falha de rede/CORS ao chamar n8n. Detalhe: " + (e?.message || e));
    }

    const raw = await resp.text().catch(() => "");
    console.log("[IMPRIMIR] N8N status:", resp.status, "raw:", raw);

    if (!raw) throw new Error("N8N retornou vazio. Verifique o workflow!");

    let data;
    try { data = JSON.parse(raw); }
    catch (_) { throw new Error("N8N não retornou JSON válido. Resposta: " + raw); }

    let respostaText = "";
    if (Array.isArray(data)) {
      
      if (data[0] && typeof data[0].resposta === "string") {
        respostaText = data[0].resposta;
      } else {
        throw new Error("N8N retornou array, mas sem 'resposta' string: " + JSON.stringify(data));
      }
    } else if (typeof data.resposta === "string") {
      respostaText = data.resposta;
    } else {
      throw new Error("N8N não retornou {resposta: string}. JSON: " + JSON.stringify(data));
    }

    return respostaText;
  }

    function imprimirTexto(resposta, titulo) {
    const safeTitle = titulo || "Histórico";
    const safeText = String(resposta || "")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

    const html = `
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
    <meta charset="UTF-8" />
    <title>${safeTitle}</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; padding: 24px; }
        h1 { font-size: 18px; margin: 0 0 12px; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 12.5px; line-height: 1.45; }
    </style>
    </head>
    <body>
    <h1>${safeTitle}</h1>
    <pre>${safeText}</pre>
    </body>
    </html>`.trim();

    const iframe = document.createElement("iframe");
    iframe.style.position = "fixed";
    iframe.style.right = "0";
    iframe.style.bottom = "0";
    iframe.style.width = "0";
    iframe.style.height = "0";
    iframe.style.border = "0";
    document.body.appendChild(iframe);

    iframe.onload = function () {
        try {
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
        } finally {
        setTimeout(() => iframe.remove(), 1000);
        }
    };

    const doc = iframe.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();
    }

  function renderModal() {
    document.body.innerHTML = `
      <style>
        body { font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #000; }
        .container { padding: 16px; width: 100%; max-width: 350px; margin: 0 auto; }
        .actions { display: flex; gap: 16px; margin-bottom: 16px; justify-content: flex-start; }
        button {
          padding: 8px 8px;
          width: 160px;
          cursor: pointer;
          background-color: #192d3e;
          color: #ffffff;
          border: none;
          border-radius: 6px;
          font-size: 14px;
        }
        .box { margin-top: 16px; }
        .row { display: flex; gap: 16px; margin-top: 16px; justify-content: flex-start; }
        .msg { margin-top: 10px; color: #b00020; font-size: 13px; min-height: 18px; white-space: pre-wrap; }
      </style>

      <div class="container">
        <div class="actions">
          <button id="btn-hoje" type="button">HOJE</button>
          <button id="btn-anteriores" type="button">DIAS ANTERIORES</button>
        </div>

        <div id="box-hoje" class="box" style="display:none;">
          <p>Será impresso o histórico de hoje.</p>
          <div class="row">
            <button id="btn-confirmar-hoje" type="button">CONFIRMAR</button>
            <button id="btn-cancelar-hoje" type="button">CANCELAR</button>
          </div>
          <div id="msg-hoje" class="msg"></div>
        </div>

        <div id="box-data" class="box" style="display:none;">
          <p>(Depois fazemos os dias anteriores)</p>
        </div>
      </div>
    `;

    const btnHoje = document.getElementById("btn-hoje");
    const btnAnt = document.getElementById("btn-anteriores");
    const boxHoje = document.getElementById("box-hoje");
    const boxData = document.getElementById("box-data");
    const msgHojeEl = document.getElementById("msg-hoje");

    function setMsgHoje(t) { msgHojeEl.textContent = t || ""; }

    btnHoje.onclick = () => {
      boxData.style.display = "none";
      boxHoje.style.display = "block";
      setMsgHoje("");
    };

    btnAnt.onclick = () => {
      boxHoje.style.display = "none";
      boxData.style.display = "block";
      setMsgHoje("");
    };

    document.getElementById("btn-cancelar-hoje").onclick = () => {
      window.WlExtension.closeModal({ cancelled: true });
    };

    document.getElementById("btn-confirmar-hoje").onclick = () => {
      window.WlExtension.closeModal({ action: "hoje" });
    };
  }

  function initExtension() {
    window.WlExtension.initialize({
      buttons: {
        "attendance-view": [
          {
            icon_url: "https://img.icons8.com/material-sharp/15/000000/print.png",
            text: "IMPRIMIR",
            callback: (atendimento) => {

              const modalUrl =
                "https://avsysgeo-mariaeduarda.github.io/IMPRIMIR_AVS_CHAT/?mode=modal&v=" +
                Date.now();

              window.WlExtension.modal({
                title: "IMPRIMIR",
                url: modalUrl,
                maxWidth: "450px",
                height: "300px",

                callback: async (ret) => {
                  if (!ret || ret.cancelled) return;

                  if (ret.action === "hoje") {
                    let userInfo = {};
                    try {
                      userInfo = await window.WlExtension.getInfoUser();
                      console.log("[WL] userInfo:", userInfo);
                    } catch (e) {
                      console.warn("[WL] Falha ao obter userInfo:", e);
                    }

                    const payload = {
                      tipo: "hoje",

                      attendanceId: atendimento?.atendimentoId ?? "",
                      contactId: atendimento?.contactId ?? atendimento?.contact?.id ?? "",
                      channelId: atendimento?.channelId ?? atendimento?.channel?.id ?? "",
                      organizationId: atendimento?.organizationId ?? atendimento?.organization?.id ?? "",
                      sectorId: atendimento?.sectorId ?? atendimento?.sector?.id ?? "",

                      userId: userInfo?.userId || "",
                      systemKey: userInfo?.systemKey || "",

                      numero: numero,
                      chatId: chatId,
                      tokenAVS: tokenAVS
                    };

                    try {
                      const resposta = await chamarN8n(payload);
                      imprimirTexto(resposta, "Histórico de hoje");

                      window.WlExtension.alert({
                        message: "Impressão enviada!",
                        variant: "success"
                      });
                    } catch (e) {
                      window.WlExtension.alert({
                        message: "Falhou ao imprimir: " + String(e?.message || e),
                        variant: "error"
                      });
                    }
                  }
                }
              });
            }
          }
        ]
      }
    });
  }

  if (getParam("mode") === "modal") {
    renderModal();
  } else {
    initExtension();
  }
</script>

</body>
</html>
