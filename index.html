<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMPRIMIR</title>
</head>

<body>

  <script src="https://fileschat.sfo2.cdn.digitaloceanspaces.com/public/libs/wlclient.js"></script>

  <script>
    const N8N_WEBHOOK_URL = "https://n8n.srv1157562.hstgr.cloud/webhook/imprimir_historico";

    const numero = "@contato.numero";
    const chatId = "@chat.codigo";
    const tokenAVS = "@canal.token";

    function getParam(name) {
      try { return new URL(window.location.href).searchParams.get(name); }
      catch (_) { return null; }
    }

    async function chamarN8n(payload, url) {
      console.log("[IMPRIMIR] POST N8N:", url);
      console.log("[IMPRIMIR] PAYLOAD:", payload);

      let resp;
      try {
        resp = await fetch(url, {
          method: "POST",
          cache: "no-store",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(payload),
        });
      } catch (e) {
        throw new Error("Falha ao chamar n8n: " + (e?.message || e));
      }

      const raw = await resp.text().catch(() => "");
      console.log("[IMPRIMIR] N8N status:", resp.status, "raw:", raw);

      if (!raw) throw new Error("N8N retornou vazio.");

      let data;
      try {
        data = JSON.parse(raw);
      } catch (_) {
        throw new Error("N8N não retornou JSON válido. Resposta: " + raw);
      }

      let respostaText = "";

      if (Array.isArray(data)) {
        if (data[0] && typeof data[0].resposta === "string") {
          respostaText = data[0].resposta;
        } else {
          throw new Error("Array retornado sem 'resposta' válida.");
        }
      }

      else if (typeof data.resposta === "string") {
        respostaText = data.resposta;
      }

      else {
        throw new Error("JSON inválido. Esperado {resposta: string}");
      }

      return respostaText;
    }

    function imprimirTexto(resposta, titulo) {
      const safeTitle = titulo || "Histórico";
      const safeText = String(resposta || "")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      const html = `
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
    <meta charset="UTF-8" />
    <title>${safeTitle}</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; padding: 24px; }
        h1 { font-size: 18px; margin: 0 0 12px; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 12.5px; line-height: 1.45; }
    </style>
    </head>
    <body>
    <h1>${safeTitle}</h1>
    <pre>${safeText}</pre>
    </body>
    </html>`.trim();

      const iframe = document.createElement("iframe");
      iframe.style.position = "fixed";
      iframe.style.right = "0";
      iframe.style.bottom = "0";
      iframe.style.width = "0";
      iframe.style.height = "0";
      iframe.style.border = "0";
      document.body.appendChild(iframe);

      let jaImprimiu = false;

      iframe.onload = function () {
        if (jaImprimiu) return;
        jaImprimiu = true;

        setTimeout(() => {
          try {
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
          } finally {
            setTimeout(() => iframe.remove(), 1000);
          }
        }, 200);
      };

      const doc = iframe.contentWindow.document;
      doc.open();
      doc.write(html);
      doc.close();
    }

    function renderModal() {
      document.body.innerHTML = `
        <style>
          body { 
            font-family: Arial, Helvetica, sans-serif; 
            font-size: 14px; 
            margin: 0;
          }
          .container { 
            padding: 16px; 
            max-width: 350px; 
            margin: 0 auto; 
          }
          .actions { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 16px; 
            flex-wrap: wrap;
          }
          button {
            padding: 8px;
            width: 160px;
            cursor: pointer;
            background-color: #192d3e;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
          }
          input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
          }
          .box { margin-top: 16px; display:none; }
          .row { 
            display: flex; 
            gap: 10px; 
            margin-top: 12px; 
            flex-wrap: wrap;
          }
          .msg { 
            margin-top: 10px; 
            color: #b00020; 
            font-size: 13px; 
            min-height: 18px; 
          }
        </style>
    
        <div class="container">
          <div class="actions">
            <button id="btn-hoje">HOJE</button>
            <button id="btn-anteriores">DIAS ANTERIORES</button>
            <button id="btn-passados">DIAS PASSADOS</button>
          </div>
    
          <!-- HOJE -->
          <div id="box-hoje" class="box">
            <p>Será impresso o histórico de hoje.</p>
            <div class="row">
              <button id="confirm-hoje">CONFIRMAR</button>
              <button id="cancel-hoje">CANCELAR</button>
            </div>
          </div>
    
          <!-- DIAS ANTERIORES (1 data específica) -->
          <div id="box-anteriores" class="box">
            <p>Informe a data (DD/MM/AA)</p>
            <input id="input-anterior" maxlength="8" placeholder="DD/MM/AA" />
            <div class="row">
              <button id="confirm-anterior">CONFIRMAR</button>
              <button id="cancel-anterior">CANCELAR</button>
            </div>
            <div id="msg-anterior" class="msg"></div>
          </div>
    
          <!-- DIAS PASSADOS (quantidade de dias) -->
          <div id="box-passados" class="box">
            <p>Informe quantos dias anteriores deseja consultar</p>
            <input id="input-passados" type="number" placeholder="Ex: 7" />
            <div class="row">
              <button id="confirm-passados">CONFIRMAR</button>
              <button id="cancel-passados">CANCELAR</button>
            </div>
            <div id="msg-passados" class="msg"></div>
          </div>
    
        </div>
      `;
    
      const boxHoje = document.getElementById("box-hoje");
      const boxAnteriores = document.getElementById("box-anteriores");
      const boxPassados = document.getElementById("box-passados");
    
      function esconderTodos() {
        boxHoje.style.display = "none";
        boxAnteriores.style.display = "none";
        boxPassados.style.display = "none";
      }
    
      document.getElementById("btn-hoje").onclick = () => {
        esconderTodos();
        boxHoje.style.display = "block";
      };
    
      document.getElementById("btn-anteriores").onclick = () => {
        esconderTodos();
        boxAnteriores.style.display = "block";
      };
    
      document.getElementById("btn-passados").onclick = () => {
        esconderTodos();
        boxPassados.style.display = "block";
      };
    
      document.getElementById("cancel-hoje").onclick =
      document.getElementById("cancel-anterior").onclick =
      document.getElementById("cancel-passados").onclick = () => {
        window.WlExtension.closeModal({ cancelled: true });
      };
    
      document.getElementById("confirm-hoje").onclick = () => {
        window.WlExtension.closeModal({ action: "hoje" });
      };
    
      document.getElementById("confirm-anterior").onclick = () => {
        const valor = document.getElementById("input-anterior").value.trim();
        const regex = /^\d{2}\/\d{2}\/\d{2}$/;
    
        if (!regex.test(valor)) {
          document.getElementById("msg-anterior").textContent =
            "Use formato DD/MM/AA";
          return;
        }
    
        window.WlExtension.closeModal({
          action: "data_unica",
          data: valor
        });
      };
    
      document.getElementById("confirm-passados").onclick = () => {
        const dias = document.getElementById("input-passados").value.trim();
    
        if (!dias || parseInt(dias) <= 0) {
          document.getElementById("msg-passados").textContent =
            "Informe um número válido.";
          return;
        }
    
        window.WlExtension.closeModal({
          action: "dias_passados",
          quantidade: parseInt(dias)
        });
      };
    }

    function initExtension() {
      window.WlExtension.initialize({
        buttons: {
          "attendance-view": [
            {
              icon_url: "https://img.icons8.com/material-sharp/15/000000/print.png",
              text: "IMPRIMIR",
              callback: (atendimento) => {

                const modalUrl =
                  "https://avsysgeo-mariaeduarda.github.io/IMPRIMIR_AVS_CHAT/?mode=modal&v=" +
                  Date.now();

                window.WlExtension.modal({
                  title: "IMPRIMIR",
                  url: modalUrl,
                  maxWidth: "650px",
                  height: "300px",

                  callback: async (ret) => {
                    console.log("RETORNO MODAL:", ret);

                    if (!ret || ret.cancelled) return;

                    let userInfo = {};
                    try {
                      userInfo = await window.WlExtension.getInfoUser();
                    } catch (e) { }

                    const payload = {
                      tipo: ret.action,
                      data: ret.data || "",

                      attendanceId: atendimento?.atendimentoId ?? "",
                      contactId: atendimento?.contactId ?? atendimento?.contact?.id ?? "",
                      channelId: atendimento?.channelId ?? atendimento?.channel?.id ?? "",
                      organizationId: atendimento?.organizationId ?? atendimento?.organization?.id ?? "",
                      sectorId: atendimento?.sectorId ?? atendimento?.sector?.id ?? "",

                      userId: userInfo?.userId || "",
                      systemKey: userInfo?.systemKey || "",

                      numero: numero,
                      chatId: chatId,
                      tokenAVS: tokenAVS
                    };

                    try {

                      const webhookUrl = N8N_WEBHOOK_URL;

                      console.log("WEBHOOK ESCOLHIDO:", webhookUrl);

                      const resposta = await chamarN8n(payload, webhookUrl);

                      const titulo =
                        ret.action === "data"
                          ? "Histórico de " + ret.data
                          : "Histórico de hoje";

                      imprimirTexto(resposta, titulo);

                      window.WlExtension.alert({
                        message: "Impressão enviada!",
                        variant: "success"
                      });

                    } catch (e) {
                      window.WlExtension.alert({
                        message: "Falhou ao imprimir: " + String(e?.message || e),
                        variant: "error"
                      });
                    }
                  }

                });
              }
            }
          ]
        }
      });
    }

    if (getParam("mode") === "modal") {
      renderModal();
    } else {
      initExtension();
    }
  </script>

</body>

</html>
