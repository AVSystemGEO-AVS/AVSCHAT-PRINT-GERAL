<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMPRIMIR</title>
</head>

<body>

  <script src="https://fileschat.sfo2.cdn.digitaloceanspaces.com/public/libs/wlclient.js"></script>

  <script>
    const N8N_WEBHOOK_URL = "https://n8n.srv1157562.hstgr.cloud/webhook/imprimir_historico";

    const numero = "@contato.numero";
    const chatId = "@chat.codigo";
    const tokenAVS = "@canal.token";

    function getParam(name) {
      try { return new URL(window.location.href).searchParams.get(name); }
      catch (_) { return null; }
    }

    async function chamarN8n(payload, url) {
      console.log("[IMPRIMIR] POST N8N:", url);
      console.log("[IMPRIMIR] PAYLOAD:", payload);

      let resp;
      try {
        resp = await fetch(url, {
          method: "POST",
          cache: "no-store",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(payload),
        });
      } catch (e) {
        throw new Error("Falha ao chamar n8n: " + (e?.message || e));
      }

      const raw = await resp.text().catch(() => "");
      console.log("[IMPRIMIR] N8N status:", resp.status, "raw:", raw);

      if (!raw) throw new Error("N8N retornou vazio.");

      let data;
      try {
        data = JSON.parse(raw);
      } catch (_) {
        throw new Error("N8N não retornou JSON válido. Resposta: " + raw);
      }

      let respostaText = "";

      if (Array.isArray(data)) {
        if (data[0] && typeof data[0].resposta === "string") {
          respostaText = data[0].resposta;
        } else {
          throw new Error("Array retornado sem 'resposta' válida.");
        }
      }

      else if (typeof data.resposta === "string") {
        respostaText = data.resposta;
      }

      else {
        throw new Error("JSON inválido. Esperado {resposta: string}");
      }

      return respostaText;
    }

    function imprimirTexto(resposta, titulo) {
      const safeTitle = titulo || "Histórico";
      const safeText = String(resposta || "")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      const html = `
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
    <meta charset="UTF-8" />
    <title>${safeTitle}</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; padding: 24px; }
        h1 { font-size: 18px; margin: 0 0 12px; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 12.5px; line-height: 1.45; }
    </style>
    </head>
    <body>
    <h1>${safeTitle}</h1>
    <pre>${safeText}</pre>
    </body>
    </html>`.trim();

      const iframe = document.createElement("iframe");
      iframe.style.position = "fixed";
      iframe.style.right = "0";
      iframe.style.bottom = "0";
      iframe.style.width = "0";
      iframe.style.height = "0";
      iframe.style.border = "0";
      document.body.appendChild(iframe);

      let jaImprimiu = false;

      iframe.onload = function () {
        if (jaImprimiu) return;
        jaImprimiu = true;

        setTimeout(() => {
          try {
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
          } finally {
            setTimeout(() => iframe.remove(), 1000);
          }
        }, 200);
      };

      const doc = iframe.contentWindow.document;
      doc.open();
      doc.write(html);
      doc.close();
    }

    function renderModal() {
      document.body.innerHTML = `
        <style>
          body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            color: #000;
          }
    
          .container {
            padding: 16px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
          }
    
          .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
          }
    
          button {
            padding: 8px;
            width: 170px;
            cursor: pointer;
            background-color: #192d3e;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
          }
    
          .box {
            margin-top: 16px;
            display: none;
          }
    
          .row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
          }
    
          .row input {
            flex: 1;
          }
    
          .msg {
            margin-top: 10px;
            color: #b00020;
            font-size: 13px;
            min-height: 18px;
          }
    
          input {
            padding: 6px;
            box-sizing: border-box;
          }
        </style>
    
        <div class="container">
    
          <div class="actions">
            <button id="btn-hoje" type="button">HOJE</button>
            <button id="btn-periodo" type="button">DIAS ANTERIORES</button>
          </div>
    
          <div id="box-hoje" class="box">
            <p>Será impresso o histórico de hoje.</p>
            <div class="row">
              <button id="btn-confirmar-hoje" type="button">CONFIRMAR</button>
              <button id="btn-cancelar-hoje" type="button">CANCELAR</button>
            </div>
            <div id="msg-hoje" class="msg"></div>
          </div>
    
          <div id="box-periodo" class="box">
            <p>Informe o período (DD/MM/AA)</p>
            <div class="row">
              <input id="input-inicio" type="tel" maxlength="8" placeholder="Data início" />
              <input id="input-fim" type="tel" maxlength="8" placeholder="Data fim" />
            </div>
            <div class="row">
              <button id="btn-confirmar-periodo" type="button">CONFIRMAR</button>
              <button id="btn-cancelar-periodo" type="button">CANCELAR</button>
            </div>
            <div id="msg-periodo" class="msg"></div>
          </div>
    
        </div>
      `;
    
      const boxHoje = document.getElementById("box-hoje");
      const boxPeriodo = document.getElementById("box-periodo");
      const msgPeriodo = document.getElementById("msg-periodo");
    
      function hideAll() {
        boxHoje.style.display = "none";
        boxPeriodo.style.display = "none";
      }
    
      function formatarData(input) {
        input.addEventListener("input", function () {
          let numbers = this.value.replace(/\D/g, "").substring(0, 8);
          let result = "";
    
          if (numbers.length >= 2) result += numbers.substring(0, 2);
          else result += numbers;
    
          if (numbers.length > 2)
            result += "/" + numbers.substring(2, 4);
    
          if (numbers.length > 4)
            result += "/" + numbers.substring(4, 8);
    
          this.value = result;
        });
      }
    
      formatarData(document.getElementById("input-inicio"));
      formatarData(document.getElementById("input-fim"));
    
      document.getElementById("btn-hoje").onclick = () => {
        hideAll();
        boxHoje.style.display = "block";
      };
    
      document.getElementById("btn-periodo").onclick = () => {
        hideAll();
        boxPeriodo.style.display = "block";
      };
    
      document.getElementById("btn-confirmar-hoje").onclick = () => {
        window.WlExtension.closeModal({ action: "hoje" });
      };
    
      document.getElementById("btn-cancelar-hoje").onclick = () => {
        window.WlExtension.closeModal({ cancelled: true });
      };
    
      document.getElementById("btn-confirmar-periodo").onclick = () => {
        const inicio = document.getElementById("input-inicio").value.trim();
        const fim = document.getElementById("input-fim").value.trim();
    
        if (!/^\d{2}\/\d{2}\/\d{2}$/.test(inicio) ||
            !/^\d{2}\/\d{2}\/\d{2}$/.test(fim)) {
          msgPeriodo.textContent = "Datas inválidas. Use DD/MM/AA";
          return;
        }
    
        window.WlExtension.closeModal({
          action: "periodo",
          dataInicio: inicio,
          dataFim: fim
        });
      };
    
      document.getElementById("btn-cancelar-periodo").onclick = () => {
        window.WlExtension.closeModal({ cancelled: true });
      };
    }

    function initExtension() {
      window.WlExtension.initialize({
        buttons: {
          "attendance-view": [
            {
              icon_url: "https://img.icons8.com/material-sharp/15/000000/print.png",
              text: "IMPRIMIR",
              callback: (atendimento) => {

                const modalUrl =
                  "https://avsystemgeo-avs.github.io/AVSCHAT-PRINT-GERAL/?mode=modal&v=" +
                  Date.now();

                window.WlExtension.modal({
                  title: "IMPRIMIR",
                  url: modalUrl,
                  maxWidth: "650px",
                  height: "300px",

                  callback: async (ret) => {
                    console.log("RETORNO MODAL:", ret);

                    if (!ret || ret.cancelled) return;

                    let userInfo = {};
                    try {
                      userInfo = await window.WlExtension.getInfoUser();
                    } catch (e) { }

                    const payload = {
                      tipo: ret.action,
                      data: ret.data || "",
                      dataInicio: ret.dataInicio || "",
                      dataFim: ret.dataFim || "",

                      attendanceId: atendimento?.atendimentoId ?? "",
                      contactId: atendimento?.contactId ?? atendimento?.contact?.id ?? "",
                      channelId: atendimento?.channelId ?? atendimento?.channel?.id ?? "",
                      organizationId: atendimento?.organizationId ?? atendimento?.organization?.id ?? "",
                      sectorId: atendimento?.sectorId ?? atendimento?.sector?.id ?? "",

                      userId: userInfo?.userId || "",
                      systemKey: userInfo?.systemKey || "",

                      numero: numero,
                      chatId: chatId,
                      tokenAVS: tokenAVS
                    };

                    try {

                      const webhookUrl = N8N_WEBHOOK_URL;

                      console.log("WEBHOOK ESCOLHIDO:", webhookUrl);

                      const resposta = await chamarN8n(payload, webhookUrl);

                      const titulo =
                        ret.action === "data"
                          ? "Histórico de " + ret.data
                          : "Histórico de hoje";

                      imprimirTexto(resposta, titulo);

                      window.WlExtension.alert({
                        message: "Impressão enviada!",
                        variant: "success"
                      });

                    } catch (e) {
                      window.WlExtension.alert({
                        message: "Falhou ao imprimir: " + String(e?.message || e),
                        variant: "error"
                      });
                    }
                  }

                });
              }
            }
          ]
        }
      });
    }

    if (getParam("mode") === "modal") {
      renderModal();
    } else {
      initExtension();
    }
  </script>

</body>

</html>
